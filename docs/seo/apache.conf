<IfModule mod_rewrite.c>
  RewriteEngine On

  RewriteCond %{HTTPS} !=on [OR]
  RewriteCond %{HTTP_HOST} ^www\.shreevenkateshwara\.com$ [NC]
  RewriteRule ^ https://shreevenkateshwara.com%{REQUEST_URI} [R=301,L]

  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_URI} .+/$
  RewriteRule ^(.+)/$ https://shreevenkateshwara.com/$1 [R=301,L]
</IfModule>

<IfModule mod_headers.c>
  Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
  Header always set X-Content-Type-Options "nosniff"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"

  <Location "/api/">
    Header always set X-Robots-Tag "noindex, nofollow, noarchive"
  </Location>

  <Location "/rss.xml">
    Header always set X-Robots-Tag "noindex, follow"
    Header always set Cache-Control "public, max-age=3600, stale-while-revalidate=86400"
  </Location>

  <Location "/atom.xml">
    Header always set X-Robots-Tag "noindex, follow"
    Header always set Cache-Control "public, max-age=3600, stale-while-revalidate=86400"
  </Location>

  <Location "/robots.txt">
    Header always set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
  </Location>

  <Location "/sitemap.xml">
    Header always set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
  </Location>

  <Location "/sitemaps/">
    Header always set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
  </Location>

  <Location "/manifest.webmanifest">
    Header always set Cache-Control "public, max-age=86400, stale-while-revalidate=604800"
  </Location>

  <FilesMatch "\.(css|js|jpg|jpeg|png|gif|webp|avif|svg|ico|woff2|mp4)$">
    Header always set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
</IfModule>
