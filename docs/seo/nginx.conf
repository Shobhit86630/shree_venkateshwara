upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name shreevenkateshwara.com www.shreevenkateshwara.com;
    return 301 https://shreevenkateshwara.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.shreevenkateshwara.com;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    return 301 https://shreevenkateshwara.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shreevenkateshwara.com;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    if ($request_uri ~ "^(.+)//+$") {
        return 301 https://shreevenkateshwara.com$1;
    }

    if ($request_uri ~ "^(.+)/+$") {
        return 301 https://shreevenkateshwara.com$1$is_args$args;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location ^~ /sitemaps/ {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location = /rss.xml {
        add_header X-Robots-Tag "noindex, follow" always;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location = /atom.xml {
        add_header X-Robots-Tag "noindex, follow" always;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location ^~ /api/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|avif|svg|ico|woff2|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_pass http://nextjs_upstream;
        include proxy_params;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_pass http://nextjs_upstream;
    }
}
